# Local development stack. The embed sidecar defaults to the hash
# embedder so the compose-up path works offline; export
# EMBEDDER_KIND=hf to switch to sentence-transformers.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: docindex
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docindex"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  embed:
    build:
      context: ./services/embed-sidecar
      dockerfile: Dockerfile
    environment:
      EMBEDDER_KIND: ${EMBEDDER_KIND:-hash}
      EMBEDDER_MODEL: ${EMBEDDER_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8088/healthz\").status==200 else 1)'"]
      interval: 5s
      timeout: 3s
      retries: 30

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        BIN: server
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/docindex?sslmode=disable
      EMBED_URL: http://embed:8088
      HTTP_ADDR: ":8080"
    depends_on:
      postgres:
        condition: service_healthy
      embed:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata: {}

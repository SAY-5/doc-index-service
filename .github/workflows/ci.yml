name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.22"
  PY_VERSION: "3.12"

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  lint-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/embed-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .

  typecheck-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/embed-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}
      - run: pip install -e ".[dev]"
      - run: mypy app

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Unit tests with coverage
        run: |
          # Coverage is gated over the pure-logic packages only. The
          # store package and integration paths are exercised by the
          # bench-smoke job below against a real Postgres.
          go test -race -covermode=atomic -coverprofile=coverage.out \
            ./internal/api/... \
            ./internal/chunker/... \
            ./internal/search/... \
            ./internal/seed/... \
            ./pkg/embed/...
          go tool cover -func=coverage.out | tail -n 1
      - name: Coverage gate (>= 85%)
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "coverage: $pct%"
          awk -v p="$pct" 'BEGIN{ if (p+0 < 85.0) { print "coverage below 85"; exit 1 } }'

  test-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/embed-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}
      - run: pip install -e ".[test]"
      - name: Run pytest with coverage
        env:
          EMBEDDER_KIND: hash
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80 tests/

  bench-smoke:
    runs-on: ubuntu-latest
    needs: [test-go, test-py]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: docindex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}
      - name: Install psql
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Apply migrations
        env:
          DSN: postgres://postgres:postgres@localhost:5432/docindex?sslmode=disable
        run: |
          for f in migrations/*.up.sql; do
            echo ">> $f"
            psql "$DSN" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Start embed sidecar
        working-directory: services/embed-sidecar
        env:
          EMBEDDER_KIND: hash
        run: |
          pip install -e .
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8088 >/tmp/embed.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://localhost:8088/healthz; then break; fi
            sleep 1
          done
      - name: Run bench smoke (1k docs, 100 queries)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/docindex?sslmode=disable
          EMBED_URL: http://localhost:8088
        run: go run ./bench -docs 1000 -queries 100 -smoke
      - name: Verify artefact
        run: |
          ls -la bench/results
          test "$(ls bench/results/*.json | wc -l)" -ge 1

  build:
    runs-on: ubuntu-latest
    needs: [lint-go, lint-py, typecheck-py, test-go, test-py]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          build-args: BIN=server
          push: false
          tags: doc-index-service-server:ci
      - name: Build indexer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          build-args: BIN=indexer
          push: false
          tags: doc-index-service-indexer:ci
      - name: Build embed sidecar image
        uses: docker/build-push-action@v6
        with:
          context: services/embed-sidecar
          file: services/embed-sidecar/Dockerfile
          push: false
          tags: doc-index-service-embed:ci

version: "2"

run:
  timeout: 5m
  go: "1.22"
  build-tags:
    - integration

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - misspell
    - bodyclose
    - unconvert
  settings:
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
    revive:
      rules:
        - name: var-naming
          disabled: true
        - name: exported
          arguments:
            - disableStutteringCheck

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
